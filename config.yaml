# =============================================================================
# config.yaml — Pipeline de génération de falsifications synthétiques annotées
# =============================================================================
# Config GÉNÉRIQUE, réutilisable sur n'importe quel corpus de documents.
# Tout est paramétré ici ; rien n'est codé en dur dans les modules.
#
# Démarrage rapide (sans éditer ce fichier) :
#   python -m src.orchestrator --src <DOSSIER_IMAGES> --out <DOSSIER_SORTIE> --n 1000
#
# Le pipeline s'adapte automatiquement au type de corpus (voir compression.q1_mode).
# =============================================================================

# --- Chemins -----------------------------------------------------------------
paths:
  source_dir: null            # dossier des images sources ; ou passe --src en CLI
  output_dir: "output"        # racine des sorties ; ou passe --out en CLI
  probe_report: "output/distribution.json"

# --- Sonde du corpus (module jpeg_probe) -------------------------------------
probe:
  recursive: true             # parcourt les sous-dossiers
  candidate_ext: [".jpg", ".jpeg", ".jpe", ".jfif", ".png", ".tif", ".tiff", ".bmp"]
  # Garder les sources lossless (PNG/TIFF/BMP : pas de Q0) ? True = tout corpus
  # accepté (le mode Q1 contrôlé prend le relais, cf. ci-dessous).
  allow_lossless: true
  # Écart (somme |diff| sur 64 coeffs) au-delà duquel une qtable JPEG est dite
  # "non standard" (scanners/téléphones). Q0 est estimé quand même et signalé.
  nonstandard_absdiff_threshold: 40

# --- Compression -------------------------------------------------------------
# Q0 = qualité déjà inscrite dans la source (LUE, jamais choisie).
# Q2 = compression finale (fond ET zone éditée, en UNE seule passe). Seul le
#      couple (Q1, Q2) est balayé ; Q0 n'est jamais réinventé.
compression:
  q2_sweep: [55, 70, 85, 95]  # couvre Q2<Q1, Q2≈Q1, Q2>Q1
  # Q1 = historique de compression du "document original" avant falsification :
  #   native     -> on garde Q0 (scénario réaliste). Pertinent si le corpus a une
  #                 vraie histoire JPEG variée (Q0 pas trop proche de 100).
  #   controlled -> on impose Q1 par une recompression unique : le fond devient
  #                 réellement double-compressé Q1->Q2. OBLIGATOIRE pour un corpus
  #                 lossless (PNG), et recommandé si Q0≈100 (double compression
  #                 native trop faible pour un signal exploitable).
  #   auto       -> décide seul : lossless OU Q0 médian >= seuil -> controlled ;
  #                 sinon native. Le choix est journalisé et figé dans run_config.yaml.
  q1_mode: auto
  q1_auto_q0_threshold: 95    # seuil Q0 médian déclenchant controlled en mode auto
  q1_sweep: [55, 70, 85]      # utilisé si controlled ; ⊆ q2_sweep -> couvre Q1<Q2/=/>

# --- Falsification (module forger) -------------------------------------------
forger:
  # Types à générer : UN SOUS-DOSSIER COMPLET ET SÉPARÉ par type, PLUS aucun
  # tirage aléatoire entre types. Ajoute/retire des entrées librement.
  #   sortie -> <output_dir>/<type>/{data,manifest.parquet,distribution.json,
  #             run_config.yaml,REPORT.md}   (chaque sous-dossier est autonome)
  #   fusion -> ./aggregate.sh --out <output_dir>
  edit_types:
    - substitution            # pixels neufs peints (texte) ; alignment = N/A
    - copy_move               # région recopiée de la même image (grille Q1)
    - splice                  # région d'un autre document du corpus (grille étrangère)
  aligned_ratio: 0.5          # part alignée sur la grille 8x8 (copy_move + splice)
  feather_radius_px: [0.5, 2.0]   # adoucissement des bords (anti-tell), tiré uniformément
  splice_source: "intra_corpus"   # donneur = autre doc du même corpus
  # Taille MINIMALE garantie du rectangle falsifié, quel que soit size_class ou
  # la taille de l'image : [largeur_min_px, hauteur_min_px] (ou un seul entier
  # pour un plancher carré). Arrondie au multiple de 8 SUPÉRIEUR (grille JPEG) :
  # [10, 10] garantit donc >= 16x16, jamais moins que ce qui est demandé ici.
  # Empêche tout masque à 0 pixel sur des corpus à images très petites
  # (miniatures, crops) : si une source ne peut pas accueillir ce minimum sur
  # un axe, le job échoue proprement (erreur journalisée, pas de masque vide
  # écrit).
  min_region_px: [10, 10]

# --- Classes de taille de zone (fraction de surface page, calées ×8 px) ------
size_classes:
  small:      [0.001, 0.005]  # ~0.1% – 0.5% de la page
  medium:     [0.005, 0.02]   # 0.5% – 2%
  large:      [0.02, 0.06]    # 2% – 6%
  very_large: [0.06, 0.15]    # 6% – 15%

# --- Négatifs ----------------------------------------------------------------
# `ratio` s'applique DANS CHAQUE sous-dossier de type : chacun contient ses
# positifs (de son type) + sa part d'authentiques -> sous-dossier autonome, et
# le ratio est PRÉSERVÉ après agrégation (mêmes proportions dans le lot fusionné).
negatives:
  ratio: 0.3                  # part de documents authentiques (Q0/Q1 -> Q2, masque vide)
  keep_benign_colored: true   # préserve logos/tampons/en-têtes (évite "coloré = anomalie")

# --- Annotation (module annotator) -------------------------------------------
annotator:
  input_res: 384              # résolution d'entrée du modèle en aval
  patch_size: 16              # patch 16 px -> grille 24x24 sur entrée 384
  patch_grid: 24
  patch_positive_overlap: 0.5 # patch positif si recouvrement du masque > seuil

# --- QA visuel (module ela_preview, hors entraînement) -----------------------
ela_preview:
  ela_quality: 90             # qualité ELA d'aperçu, DISTINCTE de Q2
  n_samples: 50               # nb de planches image | ELA | masque

# --- Orchestration (module orchestrator) -------------------------------------
orchestrator:
  seed: 42                    # seed global ; chaque doc reçoit un seed dérivé déterministe
  n_docs: 2000                # taille du lot PAR TYPE (chaque sous-dossier aura n_docs docs)
  n_workers: 4                # parallélisation
